services:
  - type: web
    name: royal-billing-api
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/billing.db
      - key: UPLOADS_DIR
        value: /data/uploads
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
