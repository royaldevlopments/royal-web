<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0948b3"/>
      <stop offset="100%" stop-color="#7100b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0948b3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- R Monogram (like Facebook style) -->
  <g filter="url(#shadow)">
    <rect x="15" y="17" width="96" height="96" rx="24" fill="url(#iconGrad)"/>
    <text x="63" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="60" font-weight="700" fill="white" text-anchor="middle">R</text>
  </g>

  <text x="135" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="38" font-weight="600" fill="#0948b3" letter-spacing="2">ROYAL</text>
  <text x="135" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="38" font-weight="600" fill="#7100b9" letter-spacing="2">DEVLOPMENTS</text>
</svg>
