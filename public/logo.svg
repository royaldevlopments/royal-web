<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0948b3"/>
      <stop offset="100%" stop-color="#7100b9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7100b9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7100b9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background hexagon shape -->
  <polygon points="55,10 95,10 115,60 95,110 55,110 35,60" fill="url(#primary)" opacity="0.95"/>
  <polygon points="55,15 90,15 108,60 90,105 55,105 37,60" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Crown icon inside hexagon -->
  <g transform="translate(75, 60)">
    <path d="M-20,15 L-25,-10 L-10,0 L0,-15 L10,0 L25,-10 L20,15 Z" fill="white" opacity="0.95"/>
    <circle cx="-15" cy="-5" r="2.5" fill="#00d4ff"/>
    <circle cx="0" cy="-10" r="2.5" fill="#00d4ff"/>
    <circle cx="15" cy="-5" r="2.5" fill="#00d4ff"/>
  </g>

  <!-- Glow line under icon -->
  <rect x="40" y="90" width="70" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Company name -->
  <text x="135" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="url(#primary)" letter-spacing="1">ROYAL</text>
  <text x="135" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="url(#primary)" letter-spacing="1">DEVLOPMENTS</text>

  <!-- Tagline dot -->
  <circle cx="135" cy="97" r="2" fill="#00d4ff"/>
  <text x="145" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#666" letter-spacing="3">TECH SOLUTIONS</text>
</svg>
