<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7100b9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0948b3"/>
      <stop offset="100%" stop-color="#7100b9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7100b9" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Gradient circle icon (like Instagram style) -->
  <g filter="url(#shadow)">
    <circle cx="63" cy="65" r="46" fill="url(#iconGrad)"/>
    <!-- Play button triangle inside (YouTube style) -->
    <path d="M50 48 L50 82 L78 65 Z" fill="white"/>
  </g>

  <text x="135" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="38" font-weight="600" fill="url(#textGrad)" letter-spacing="2">ROYAL</text>
  <text x="135" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="38" font-weight="600" fill="url(#textGrad)" letter-spacing="2">DEVLOPMENTS</text>
</svg>
